<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Library</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #232323;
      color: #d4d4d4;
      padding: 30px 20px;
      max-width: 980px;
      margin: 0 auto;
    }
    h1 {
      font-size: 18px;
      font-weight: 500;
      color: #fff;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }
    .top-note {
      margin-bottom: 16px;
      color: #9ea7af;
      font-size: 13px;
      line-height: 1.5;
    }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px 130px;
      gap: 10px;
      margin-bottom: 16px;
    }
    .search-box,
    .sort-box {
      width: 100%;
      padding: 10px 14px;
      background: #333333;
      border: 1px solid #444444;
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-box::placeholder { color: #777; }
    .search-box:focus,
    .sort-box:focus { border-color: #666; }
    .stats {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      background: #2b2b2b;
      border: 1px solid #444444;
      border-radius: 8px;
      color: #cfcfcf;
      font-size: 13px;
      white-space: nowrap;
    }
    .game {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .game:hover { background: #232323; }
    .game + .game { border-top: 1px solid #232323; }
    .game-img,
    .game-img-placeholder {
      width: 120px;
      height: 45px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .game-img { object-fit: cover; background: #1a1a1a; }
    .game-img-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2b2b2b, #1f1f1f);
      color: #7c8894;
      font-size: 11px;
      border: 1px solid #3b3b3b;
      text-align: center;
      padding: 4px;
    }
    .game-info { flex: 1; min-width: 0; }
    .game-name {
      font-size: 14px;
      color: #e8e8e8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .game-sub {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 2px;
      flex-wrap: wrap;
    }
    .game-id {
      font-size: 11px;
      color: #555;
    }
    .acc-count {
      font-size: 11px;
      color: #7f8b96;
    }
    .accounts {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      flex-shrink: 0;
      justify-content: flex-end;
      max-width: 48%;
    }
    .acc {
      background: #333333;
      color: #ffffff;
      border: none;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }
    .acc:hover { background: #444444; color: #ffffff; }
    .acc:active { transform: scale(0.95); }
    .acc.copied {
      background: #1a3a2a;
      color: #7edaa0;
    }
    .empty {
      padding: 18px 14px;
      border-radius: 8px;
      background: #2a2a2a;
      color: #9ea7af;
      font-size: 14px;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #1a3a2a;
      color: #7edaa0;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.25s ease;
      pointer-events: none;
      z-index: 1000;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    @media (max-width: 820px) {
      .toolbar { grid-template-columns: 1fr; }
      .stats { justify-content: flex-start; }
      .game { align-items: flex-start; flex-direction: column; }
      .accounts { max-width: 100%; justify-content: flex-start; }
      .game-img,
      .game-img-placeholder { width: 100%; height: auto; aspect-ratio: 460 / 215; }
    }
  </style>
</head>
<body>

    const MY_ACCOUNTS_RAW = `# Вставляйте сюда только свои доступные игры и логины.
# Формат строки:
# Название игры (AppID) - login1, login2
# или без AppID:
# Название игры - login1, login2
#
# Примеры:
# The Witcher 3: Wild Hunt (292030) - mylogin1, mylogin2
# Grand Theft Auto V Enhanced - mylogin3
`;

    const list = document.getElementById('list');
    const toast = document.getElementById('toast');
    const searchInput = document.getElementById('search');
    const sortSelect = document.getElementById('sort');
    const stats = document.getElementById('stats');
    let toastTimeout;
    let renderedGames = [];

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add('show');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toast.classList.remove('show'), 1500);
    }

    function copyAccount(login, btn) {
      const cmd = `!account ${login}`;
      navigator.clipboard.writeText(cmd).then(() => {
        btn.classList.add('copied');
        showToast(`Скопировано: ${cmd}`);
        setTimeout(() => btn.classList.remove('copied'), 1200);
      }).catch(() => {
        showToast(`Скопируйте вручную: ${cmd}`);
      });
    }

    function normalizeName(name) {
      return String(name || '')
        .toLowerCase()
        .replace(/\s+/g, ' ')
        .trim();
    }

    function unique(items) {
      return [...new Set(items.filter(Boolean))];
    }

    function parseSourceGames(raw) {
      const byAppId = new Map();
      const byName = new Map();

      raw.split('
').forEach(line => {
        const clean = line.trim();
        if (!clean) return;
        const match = clean.match(/^(.*?)\s*(?:\((\d+)\))?\s*-\s*!account\s+(.+)$/i);
        if (!match) return;
        const [, name, appIdRaw] = match;
        const nameClean = name.trim();
        const appId = (appIdRaw || '').trim();
        const item = { name: nameClean, appId };
        if (appId && !byAppId.has(appId)) byAppId.set(appId, item);
        const norm = normalizeName(nameClean);
        if (!byName.has(norm)) byName.set(norm, item);
      });

      return { byAppId, byName };
    }

    function parseInventory(raw, sourceIndex) {
      const gamesMap = new Map();

      raw.split('
').forEach(line => {
        const clean = line.trim();
        if (!clean || clean.startsWith('#') || clean.startsWith('//')) return;

        const match = clean.match(/^(.*?)\s*(?:\((\d+)\))?\s*-\s*(.+)$/);
        if (!match) return;

        const [, nameRaw, appIdRaw, accountsRaw] = match;
        const name = nameRaw.trim();
        const appId = (appIdRaw || '').trim();
        const accounts = unique(accountsRaw.split(',').map(x => x.trim()));
        if (!accounts.length) return;

        const sourceItem = (appId && sourceIndex.byAppId.get(appId)) || sourceIndex.byName.get(normalizeName(name));
        const finalName = sourceItem?.name || name;
        const finalAppId = sourceItem?.appId || appId;
        const key = finalAppId ? `id:${finalAppId}` : `name:${normalizeName(finalName)}`;

        if (!gamesMap.has(key)) {
          gamesMap.set(key, {
            name: finalName,
            appId: finalAppId,
            accounts: []
          });
        }

        const item = gamesMap.get(key);
        item.accounts = unique(item.accounts.concat(accounts));
      });

      return [...gamesMap.values()].filter(item => item.accounts.length > 0);
    }

    function getImageHtml(game) {
      if (game.appId) {
        return `<img class="game-img" src="https://cdn.akamai.steamstatic.com/steam/apps/${game.appId}/header.jpg" alt="" loading="lazy">`;
      }
      return `<div class="game-img-placeholder">Нет AppID</div>`;
    }

    function sortGames(games, mode) {
      const items = [...games];
      items.sort((a, b) => {
        if (mode === 'name-desc') return b.name.localeCompare(a.name, 'ru');
        if (mode === 'accounts-desc') {
          if (b.accounts.length !== a.accounts.length) return b.accounts.length - a.accounts.length;
          return a.name.localeCompare(b.name, 'ru');
        }
        if (mode === 'accounts-asc') {
          if (a.accounts.length !== b.accounts.length) return a.accounts.length - b.accounts.length;
          return a.name.localeCompare(b.name, 'ru');
        }
        if (mode === 'appid-asc') {
          const ai = Number(a.appId || Number.MAX_SAFE_INTEGER);
          const bi = Number(b.appId || Number.MAX_SAFE_INTEGER);
          if (ai !== bi) return ai - bi;
          return a.name.localeCompare(b.name, 'ru');
        }
        return a.name.localeCompare(b.name, 'ru');
      });
      return items;
    }

    function render() {
      const query = searchInput.value.trim().toLowerCase();
      const sorted = sortGames(renderedGames, sortSelect.value);
      const filtered = sorted.filter(game => {
        const haystack = [game.name, game.appId, ...game.accounts].join(' ').toLowerCase();
        return haystack.includes(query);
      });

      list.innerHTML = '';
      stats.textContent = `${filtered.length} игр`;

      if (!filtered.length) {
        list.innerHTML = '<div class="empty">Ничего не найдено. Проверьте поиск или добавьте свои игры в MY_ACCOUNTS_RAW.</div>';
        resizeFrame();
        return;
      }

      filtered.forEach(game => {
        const row = document.createElement('div');
        row.className = 'game';
        row.innerHTML = `
          ${getImageHtml(game)}
          <div class="game-info">
            <div class="game-name">${game.name}</div>
            <div class="game-sub">
              <div class="game-id">${game.appId ? `AppID: ${game.appId}` : 'AppID не указан'}</div>
              <div class="acc-count">Аккаунтов: ${game.accounts.length}</div>
            </div>
          </div>
          <div class="accounts">
            ${game.accounts.map(a => `<button class="acc" onclick="copyAccount('${a.replace(/'/g, "\'")}', this)">${a}</button>`).join('')}
          </div>
        `;
        list.appendChild(row);
      });

      resizeFrame();
    }

    function resizeFrame() {
      const h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight) + 8;
      if (window.frameElement) {
        window.frameElement.style.height = h + 'px';
      }
    }

    const sourceIndex = parseSourceGames(SOURCE_GAMES_RAW);
    renderedGames = parseInventory(MY_ACCOUNTS_RAW, sourceIndex);

    searchInput.addEventListener('input', render);
    sortSelect.addEventListener('change', render);
    window.addEventListener('load', resizeFrame);
    window.addEventListener('resize', resizeFrame);

    render();
  </script>
